#
# Local quality gates. Install with `pre-commit install`; run on everything
# with `pre-commit run -a`. Mirrors the helly25 house setup (mbo, bzl).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: end-of-file-fixer
        # Patches carry exact bytes (a context line for a blank source line is a
        # lone " "); trimming would corrupt them.
        exclude: '\.patch$'
      - id: trailing-whitespace
        exclude: '\.patch$'

  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.0.3
    hooks:
      - id: buildifier
      - id: buildifier-lint

  # clang-format pinned to the LLVM 22 line (matches the hermetic-llvm toolchain).
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        # Restrict to C/C++/CUDA sources; the default types_or also includes
        # JSON, which we do not want clang-format reformatting.
        types_or: [c, c++, cuda]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: align-md-tables
        name: align Markdown table columns
        entry: python3 tools/align_md_tables.py
        language: system
        files: \.md$

      - id: cdb-diff-selftest
        name: cdb_diff self-test
        entry: python3 tools/cdb_diff.py --selftest
        language: system
        files: ^tools/cdb_diff\.py$
        pass_filenames: false

      - id: blocked-merge-markers
        name: no blocked-merge markers
        entry: '(?i)do[ _-]?not[ _-]?merge'
        language: pygrep
        exclude: ^\.pre-commit-config\.yaml$

      - id: todos-need-context
        name: TODO/FIXME must cite an issue URL or email
        entry: '(TODO|FIXME)(?!.*(https?://|[A-Za-z0-9._%+-]+@))'
        language: pygrep
        # Enforced on code/config, not Markdown prose that documents the rule.
        exclude: '(\.md$|^\.pre-commit-config\.yaml$)'

      - id: no-absl-testing-matchers
        name: 'use mbo::testing status matchers, not ::absl_testing::'
        # House convention (STYLE_CPP.md "Status matchers"): mbo::testing is the
        # canonical superset; the abseil matchers are disallowed. C++ only, so the
        # Markdown docs that name the banned token do not trip it.
        entry: '::absl_testing::'
        language: pygrep
        types_or: [c++]
