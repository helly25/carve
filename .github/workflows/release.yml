name: Release
on:
  push:
    tags:
      # Numeric semver only (e.g. 0.1.0); stricter than "*.*.*" (which also
      # matches "v1.2.x"). Pushing such a tag is the only trigger - nothing here
      # publishes on a normal push.
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: read-all

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7
    permissions:
      contents: write
    with:
      # The archive built by .github/workflows/release_prep.sh.
      release_files: carve-*.tar.gz
      prerelease: true

  # Mirror the release to the Bazel Central Registry. See publish.yaml.
  publish:
    needs: release
    # Grant what publish.yaml requests; overrides the workflow-level read-all,
    # and a called workflow cannot exceed the caller's permissions.
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yaml
    with:
      tag_name: ${{ github.ref_name }}
    secrets:
      BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}
