# Publish a release to the Bazel Central Registry (BCR). Called by release.yml
# after a release is cut; can also be run from the Actions UI against a release
# tag to retry a failed run.
name: Publish to BCR

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  workflow_dispatch: {}

# Deny by default at the workflow level (checkov CKV2_GHA_1); the publish job
# opts into contents:write. Empty (not read-all) so this reusable workflow does
# not force the caller to grant every read scope.
permissions: {}

jobs:
  publish:
    permissions:
      contents: write
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.4.1
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
      registry_fork: helly25/bazel-central-registry
      # Personal-account PAT: open a draft PR so the author can click "Ready for
      # review" (GitHub forbids reviewing your own PR).
      draft: true
      # The release flow emits no SLSA attestations and uploads no workflow
      # artifact, so compute integrity by downloading the tarball from the URL in
      # .bcr/source.template.json instead.
      attest: false
      download_default_release_artifacts: false
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
