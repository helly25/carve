name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # bazelisk launches the Bazel release pinned in .bazelversion.
      - uses: bazelbuild/setup-bazelisk@v3
      # Persist Bazel's repository cache (downloaded external deps) and disk cache
      # (compiled action outputs) so each run reuses prior work instead of fetching
      # and rebuilding from scratch -- critical now that //carve/scan_deps builds
      # LLVM/Clang from source (~14 min cold). MODULE.bazel.lock is gitignored, so
      # the key hashes MODULE.bazel + .bazelversion; the github.sha suffix saves a
      # fresh entry per run and restore-keys fall back to the newest prior cache
      # for this OS (busted when MODULE.bazel or the Bazel version changes).
      - name: Mount Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', '.bazelversion') }}-${{ github.sha }}
          restore-keys: |
            bazel-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', '.bazelversion') }}-
            bazel-${{ matrix.os }}-
      - name: bazel test
        run: bazel test --config=clang //... --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo"

  # Single required status check: one job that gates merge on the whole matrix,
  # so branch protection needs only `done`. A yq/jq step self-checks that every
  # workflow job is wired into `needs`, so a newly added job cannot silently
  # escape the gate. Mirrors the helly25 house pattern (mbo/bzl/xff).
  done:
    needs: [pre-commit, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure every job is wired into this gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          declared="$(yq '.jobs | keys | .[]' .github/workflows/main.yml | grep -vx 'done' | sort)"
          wired="$(jq -r 'keys[]' <<<"${NEEDS_JSON}" | sort)"
          missing="$(comm -23 <(printf '%s\n' "${declared}") <(printf '%s\n' "${wired}"))"
          if [[ -n "${missing}" ]]; then
            echo "Jobs declared in the workflow but missing from done.needs:"
            while read -r job; do
              echo "::error title=Gate is missing a job::${job} not in done.needs"
            done <<<"${missing}"
            exit 1
          fi
          echo "done covers all $(grep -c . <<<"${declared}") workflow jobs."
      - name: Fail if any dependency did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
