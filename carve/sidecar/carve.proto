edition = "2024";

package carve;

// One cached compile action, keyed by aquery `action_key`. See
// CARVE_DESIGN.md section 4.4.
message ActionRecord {
  string action_key = 1;
  repeated string sources = 2;
  repeated string headers = 3;
  repeated string command = 4;

  // Distinguishes unset from empty so a default project can be told apart from
  // an explicitly-empty id.
  string project_id = 5 [features.field_presence = EXPLICIT];

  enum SourceKind {
    SOURCE_KIND_UNSPECIFIED = 0;
    PREPROCESSOR = 1;     // scan-deps result
    ASPECT_DECLARED = 2;  // future: from CcInfo
    ASPECT_M = 3;         // future: from aspect-scheduled -M
  }
  SourceKind source_kind = 6;

  int64 written_at = 7;  // unix seconds; for GC

  string primary_output = 8;  // exec-root-relative path of the action's primary output
}

// Persisted set of action records (the entries-by-actionkey sidecar file).
message ActionRecords {
  repeated ActionRecord records = 1;
  uint32 schema_version = 2;
}

message HeaderOwners {
  string header_path = 1;
  repeated string action_keys = 2;  // sorted; first is canonical owner
}

message HeaderIndex {
  repeated HeaderOwners owners = 1;
  uint32 schema_version = 2;
}
